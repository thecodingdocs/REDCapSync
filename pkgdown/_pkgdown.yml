url: https://thecodingdocs.github.io/REDCapSync/
home:
  title: REDCapSync
  description: Unleash R and REDCap
deploy:
  install_metadata: true
template:
  bootstrap: 5
  math-rendering: mathjax
  light-switch: true
  bslib:
    primary: "#0054AD"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
    danger: "#A6081A"
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "Brandon Rose"
    twitter:
      creator: "@brosemdmph"
      site: "@thecodingdocs"
      card: summary_large_image

  - title: Setup/Load and Use Single Project
    desc: Setup or Load REDCap your project and update using what is already saved. Define custom transformations and subsets to be passed to refreshing spreadsheets.
    contents:
      - setup_project
      - load_project
      - project

  - title: Multiple Projects
    desc: The projects object can act a single entry point for all of your projects! Sync is a hands-free function that will sync all projects based on previous settings.
    contents:
      - projects
      - sync

  - title: Configuration
    desc: Change user-level settings and clear cache
    contents:
      - config
      - cache_clear

articles:
  - title: Feautures by R User Level
    navbar: ~
    contents:
      - Basic
      - Intermediate
      - Advanced
  - title: Using RosyREDCap
    contents:
      - REDCap
  - title: API and Tokens
    contents:
      - Tokens
  - title: Setup
    contents:
      - Cache
      - project_object
      - multiple_projects
  - title: File Management
    contents:
      - Download
      - Upload
  - title: Security
    contents:
      - Security

