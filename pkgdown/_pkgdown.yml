url: https://thecodingdocs.github.io/REDCapSync/
home:
  title: REDCapSync
  description: Unleash R and REDCap
deploy:
  install_metadata: true
template:
  bootstrap: 5
  bootswatch: pulse
  math-rendering: mathjax
  light-switch: true
  bslib:
    primary: "#0054AD"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
    danger: "#A6081A"
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "Brandon Rose"
    twitter:
      creator: "@brosemdmph"
      site: "@thecodingdocs"
      card: summary_large_image

reference:
  - title: Setup/Load and Project
    desc: Setup or Load REDCap your project and update using what is already saved. Define custom datasets to be passed to refreshing spreadsheets.
    contents:
      - setup_project
      - load_project
      - project
      - dataset

  - title: Multiple Projects
    desc: The projects object can act a single entry point for all of your projects and sync is a hands-free function that will sync all projects based on previous activity.
    contents:
      - projects
      - sync

  - title: Configuration
    desc: Change user-level settings and clear cache
    contents:
      - config
      - cache_clear

articles:
  - title: Basics
    contents:
      - Cache
      - Tokens
      - Projects
  - title: Going Further
    contents:
      - Datasets
      - Uploads
      - RosyREDCap

authors:
  Brandon Rose:
    href: https://github.com/brandonerose
  Natalie Goulett:
    href: https://github.com/Goulett
